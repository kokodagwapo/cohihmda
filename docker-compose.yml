services:
  postgres:
    image: postgres:15-alpine
    container_name: coheus-postgres
    environment:
      POSTGRES_DB: coheus
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/docker/postgres-init-homestead.sh:/docker-entrypoint-initdb.d/02-create-homestead.sh
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: coheus-backend
    ports:
      - "3002:3001"
    environment:
      - NODE_ENV=development
      - PORT=3001
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=coheus
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - USE_HOMESTEAD_DB=true
      - HOMESTEAD_DB_NAME=coheus_tenant_homestead
      - FRONTEND_URL=http://localhost:5000,http://localhost:8080,http://localhost:8084
      - JWT_SECRET=${JWT_SECRET:-your-super-secret-jwt-key-change-in-production-min-32-chars}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./server:/app/server
      - /app/server/node_modules
    command: npm run dev

volumes:
  postgres_data:

