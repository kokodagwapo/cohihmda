AWSTemplateFormatVersion: "2010-09-09"
Description: |
  IAM Role for Bitbucket Pipelines OIDC Authentication (uses existing OIDC provider)

Parameters:
  ExistingOIDCProviderArn:
    Type: String
    Description: ARN of existing Bitbucket OIDC provider (get from aws iam list-open-id-connect-providers)
    Default: arn:aws:iam::339712788893:oidc-provider/api.bitbucket.org/2.0/workspaces/teraverde/pipelines-config/identity/oidc

  Audience:
    Type: String
    Description: Bitbucket Audience value
    Default: ari:cloud:bitbucket::workspace/c69f10ea-4cb5-40a2-b147-34fc30a667c7

  RoleName:
    Type: String
    Default: BitbucketOIDC-Coheus
    Description: Name for the IAM role

Resources:
  # IAM Role that Bitbucket Pipelines will assume
  BitbucketOIDCRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Ref RoleName
      Description: IAM role for Bitbucket Pipelines to deploy Coheus application
      MaxSessionDuration: 3600
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Federated: !Ref ExistingOIDCProviderArn
            Action: sts:AssumeRoleWithWebIdentity
            Condition:
              StringEquals:
                api.bitbucket.org/2.0/workspaces/teraverde/pipelines-config/identity/oidc:aud: !Ref Audience
      Tags:
        - Key: Purpose
          Value: Bitbucket Pipelines Deployment
        - Key: Application
          Value: Coheus

  # Comprehensive deployment policy covering all CloudFormation-managed resources
  DeploymentPolicy:
    Type: AWS::IAM::Policy
    Properties:
      PolicyName: CoheusDeploymentPolicy
      Roles:
        - !Ref BitbucketOIDCRole
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          # CloudFormation full access
          - Sid: CloudFormation
            Effect: Allow
            Action: cloudformation:*
            Resource: "*"

          # ECS full access (cluster, service, task definitions)
          - Sid: ECS
            Effect: Allow
            Action: ecs:*
            Resource: "*"

          # ECR full access (scoped to coheus repos)
          - Sid: ECR
            Effect: Allow
            Action: ecr:*
            Resource: !Sub arn:aws:ecr:*:${AWS::AccountId}:repository/coheus-*

          # ECR auth (account-level, no resource scope)
          - Sid: ECRAuth
            Effect: Allow
            Action: ecr:GetAuthorizationToken
            Resource: "*"

          # EC2 (VPC, subnets, security groups, NAT, EIP, routes)
          - Sid: EC2
            Effect: Allow
            Action: ec2:*
            Resource: "*"

          # ELB (ALB, target groups, listeners)
          - Sid: ELB
            Effect: Allow
            Action: elasticloadbalancing:*
            Resource: "*"

          # IAM (roles created/managed by CloudFormation stacks)
          - Sid: IAM
            Effect: Allow
            Action:
              - iam:GetRole
              - iam:CreateRole
              - iam:DeleteRole
              - iam:UpdateRole
              - iam:PutRolePolicy
              - iam:GetRolePolicy
              - iam:DeleteRolePolicy
              - iam:AttachRolePolicy
              - iam:DetachRolePolicy
              - iam:ListRolePolicies
              - iam:ListAttachedRolePolicies
              - iam:TagRole
              - iam:UntagRole
              - iam:PassRole
              - iam:CreatePolicy
              - iam:DeletePolicy
              - iam:GetPolicy
              - iam:GetPolicyVersion
              - iam:CreateServiceLinkedRole
            Resource: "*"

          # S3 (frontend buckets)
          - Sid: S3
            Effect: Allow
            Action: s3:*
            Resource:
              - arn:aws:s3:::coheus-*
              - arn:aws:s3:::coheus-*/*

          # CloudFront (distributions, cache policies, OAC, response headers)
          - Sid: CloudFront
            Effect: Allow
            Action: cloudfront:*
            Resource: "*"

          # WAFv2 (web ACLs)
          - Sid: WAFv2
            Effect: Allow
            Action: wafv2:*
            Resource: "*"

          # Lambda (edge functions for CloudFront)
          - Sid: Lambda
            Effect: Allow
            Action: lambda:*
            Resource: !Sub arn:aws:lambda:*:${AWS::AccountId}:function:coheus-*

          # CloudWatch (alarms)
          - Sid: CloudWatch
            Effect: Allow
            Action: cloudwatch:*
            Resource: "*"

          # CloudWatch Logs (log groups)
          - Sid: Logs
            Effect: Allow
            Action: logs:*
            Resource: "*"

          # KMS (encryption keys)
          - Sid: KMS
            Effect: Allow
            Action: kms:*
            Resource: "*"

          # Secrets Manager (DB credentials, API keys)
          - Sid: SecretsManager
            Effect: Allow
            Action: secretsmanager:*
            Resource: "*"

          # SNS (alert topics)
          - Sid: SNS
            Effect: Allow
            Action: sns:*
            Resource: "*"

          # Application Auto Scaling (ECS auto-scaling)
          - Sid: AutoScaling
            Effect: Allow
            Action: application-autoscaling:*
            Resource: "*"

          # SSM (ECS Exec, parameter store)
          - Sid: SSM
            Effect: Allow
            Action:
              - ssmmessages:*
              - ssm:*
            Resource: "*"

          # STS identity verification
          - Sid: STS
            Effect: Allow
            Action: sts:GetCallerIdentity
            Resource: "*"

Outputs:
  RoleArn:
    Description: Set this as AWS_ROLE_ARN in Bitbucket Repository Variables
    Value: !GetAtt BitbucketOIDCRole.Arn
    Export:
      Name: !Sub ${AWS::StackName}-RoleArn

  RoleName:
    Description: Name of the IAM role
    Value: !Ref BitbucketOIDCRole
