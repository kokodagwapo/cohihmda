AWSTemplateFormatVersion: '2010-09-09'
Description: |
  Coheus DR — secondary region landing zone (deploy in us-east-1).
  Provides VPC, private + public subnets, IGW, DB subnet group, security group, KMS key for cold restores,
  AWS Backup vault for cross-region snapshot copies, optional S3 podcast replica bucket,
  and optional NAT (EnableCompute=true) for ECS cold DR drills.

Parameters:
  ProjectName:
    Type: String
    Default: coheus

  Environment:
    Type: String
    Default: prod
    AllowedValues:
      - dev
      - staging
      - prod

  VpcCidr:
    Type: String
    Default: 10.30.0.0/16
    Description: CIDR for the DR VPC (must not overlap primary VPC)

  PrimaryReplicationRoleArn:
    Type: String
    Default: ''
    Description: IAM role ARN from primary region trusted by s3.amazonaws.com for podcast CRR. Leave empty on first deploy; update stack after role exists.

  EnableCompute:
    Type: String
    Default: 'false'
    AllowedValues:
      - 'true'
      - 'false'
    Description: >
      When true, creates NAT Gateway + private routes for ECS cold DR (billable while active).
      Keep false between drills to avoid NAT hourly charges.

Conditions:
  HasReplicationPrincipal: !Not [!Equals [!Ref PrimaryReplicationRoleArn, '']]
  ComputeEnabled: !Equals [!Ref EnableCompute, 'true']

Resources:
  DRVpc:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: !Ref VpcCidr
      EnableDnsHostnames: true
      EnableDnsSupport: true
      Tags:
        - Key: Name
          Value: !Sub '${ProjectName}-${Environment}-dr-vpc'
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment

  DRPrivateSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref DRVpc
      AvailabilityZone: !Select [0, !GetAZs '']
      CidrBlock: 10.30.1.0/24
      Tags:
        - Key: Name
          Value: !Sub '${ProjectName}-${Environment}-dr-private-1'
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment

  DRPrivateSubnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref DRVpc
      AvailabilityZone: !Select [1, !GetAZs '']
      CidrBlock: 10.30.2.0/24
      Tags:
        - Key: Name
          Value: !Sub '${ProjectName}-${Environment}-dr-private-2'
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment

  DRInternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: !Sub '${ProjectName}-${Environment}-dr-igw'
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment

  DRInternetGatewayAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      InternetGatewayId: !Ref DRInternetGateway
      VpcId: !Ref DRVpc

  DRPublicSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref DRVpc
      AvailabilityZone: !Select [0, !GetAZs '']
      CidrBlock: 10.30.10.0/24
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: !Sub '${ProjectName}-${Environment}-dr-public-1'
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment

  DRPublicSubnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref DRVpc
      AvailabilityZone: !Select [1, !GetAZs '']
      CidrBlock: 10.30.11.0/24
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: !Sub '${ProjectName}-${Environment}-dr-public-2'
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment

  DRPublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref DRVpc
      Tags:
        - Key: Name
          Value: !Sub '${ProjectName}-${Environment}-dr-public-rt'
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment

  DRPublicRoute:
    Type: AWS::EC2::Route
    DependsOn: DRInternetGatewayAttachment
    Properties:
      RouteTableId: !Ref DRPublicRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref DRInternetGateway

  DRPublicSubnet1RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      RouteTableId: !Ref DRPublicRouteTable
      SubnetId: !Ref DRPublicSubnet1

  DRPublicSubnet2RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      RouteTableId: !Ref DRPublicRouteTable
      SubnetId: !Ref DRPublicSubnet2

  DRNatEIP:
    Type: AWS::EC2::EIP
    Condition: ComputeEnabled
    Properties:
      Domain: vpc
      Tags:
        - Key: Name
          Value: !Sub '${ProjectName}-${Environment}-dr-nat-eip'
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment

  DRNatGateway:
    Type: AWS::EC2::NatGateway
    Condition: ComputeEnabled
    Properties:
      AllocationId: !GetAtt DRNatEIP.AllocationId
      SubnetId: !Ref DRPublicSubnet1
      Tags:
        - Key: Name
          Value: !Sub '${ProjectName}-${Environment}-dr-nat'
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment

  DRPrivateNatRouteTable:
    Type: AWS::EC2::RouteTable
    Condition: ComputeEnabled
    Properties:
      VpcId: !Ref DRVpc
      Tags:
        - Key: Name
          Value: !Sub '${ProjectName}-${Environment}-dr-private-nat-rt'
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment

  DRPrivateNatRoute:
    Type: AWS::EC2::Route
    Condition: ComputeEnabled
    Properties:
      RouteTableId: !Ref DRPrivateNatRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      NatGatewayId: !Ref DRNatGateway

  DRPrivateSubnet1NatRouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Condition: ComputeEnabled
    Properties:
      RouteTableId: !Ref DRPrivateNatRouteTable
      SubnetId: !Ref DRPrivateSubnet1

  DRPrivateSubnet2NatRouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Condition: ComputeEnabled
    Properties:
      RouteTableId: !Ref DRPrivateNatRouteTable
      SubnetId: !Ref DRPrivateSubnet2

  DRDbSubnetGroup:
    Type: AWS::RDS::DBSubnetGroup
    Properties:
      DBSubnetGroupDescription: !Sub 'DR subnet group for ${ProjectName} ${Environment}'
      SubnetIds:
        - !Ref DRPrivateSubnet1
        - !Ref DRPrivateSubnet2
      Tags:
        - Key: Name
          Value: !Sub '${ProjectName}-${Environment}-dr-db-subnets'
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment

  DRClusterSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: !Sub 'DR Aurora for ${ProjectName} ${Environment}'
      VpcId: !Ref DRVpc
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 5432
          ToPort: 5432
          CidrIp: !Ref VpcCidr
          Description: PostgreSQL from DR VPC
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0
      Tags:
        - Key: Name
          Value: !Sub '${ProjectName}-${Environment}-dr-aurora-sg'
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment

  DRAuroraKmsKey:
    Type: AWS::KMS::Key
    Properties:
      Description: !Sub 'DR Aurora encryption for ${ProjectName} ${Environment}'
      EnableKeyRotation: true
      KeyPolicy:
        Version: '2012-10-17'
        Statement:
          - Sid: EnableRoot
            Effect: Allow
            Principal:
              AWS: !Sub 'arn:aws:iam::${AWS::AccountId}:root'
            Action: 'kms:*'
            Resource: '*'
          - Sid: AllowRDS
            Effect: Allow
            Principal:
              Service: rds.amazonaws.com
            Action:
              - kms:Decrypt
              - kms:GenerateDataKey*
              - kms:CreateGrant
              - kms:DescribeKey
            Resource: '*'
      Tags:
        - Key: Name
          Value: !Sub '${ProjectName}-${Environment}-dr-aurora-kms'
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment

  # Cross-region backup copy destination (primary coheus_backup_stack CopyActions target this vault)
  DRBackupVault:
    Type: AWS::Backup::BackupVault
    Properties:
      BackupVaultName: !Sub '${ProjectName}-${Environment}-cohi-dr-copy'
      BackupVaultTags:
        Project: !Ref ProjectName
        Environment: !Ref Environment

  PodcastReplicaBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      # No fixed BucketName: a retained bucket from a prior stack delete would block recreate with
      # "AlreadyExists". Use stack output PodcastReplicaBucketArn for CRR / IAM (stable contract).
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      VersioningConfiguration:
        Status: Enabled
      Tags:
        - Key: Name
          Value: !Sub '${ProjectName}-${Environment}-podcast-audio-replica'
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment

  PodcastReplicaBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Condition: HasReplicationPrincipal
    Properties:
      Bucket: !Ref PodcastReplicaBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: AllowS3ReplicationFromPrimaryRole
            Effect: Allow
            Principal:
              AWS: !Ref PrimaryReplicationRoleArn
            Action:
              - s3:ReplicateObject
              - s3:ReplicateDelete
              - s3:ReplicateTags
              - s3:ObjectOwnerOverrideToBucketOwner
              - s3:GetObjectVersionTagging
            Resource: !Sub '${PodcastReplicaBucket.Arn}/*'

Outputs:
  DrBackupVaultArn:
    Description: Pass to primary region coheus_backup_stack CopyActions (DailySnapshots destination)
    Value: !GetAtt DRBackupVault.BackupVaultArn

  DrBackupVaultName:
    Description: Backup vault name in DR region
    Value: !Ref DRBackupVault

  PodcastReplicaBucketArn:
    Description: Pass as PodcastReplicationDestinationBucketArn to primary coheus_ecs_fargate_stack
    Value: !GetAtt PodcastReplicaBucket.Arn

  DRVpcId:
    Description: DR VPC ID (for restore script and future secondary ECS)
    Value: !Ref DRVpc

  DRPublicSubnet1Id:
    Description: Public subnet 1 (ALB / NAT) for DR ECS
    Value: !Ref DRPublicSubnet1

  DRPublicSubnet2Id:
    Description: Public subnet 2 (ALB / NAT) for DR ECS
    Value: !Ref DRPublicSubnet2

  DRPrivateSubnet1Id:
    Description: Private subnet 1 (ECS tasks / Aurora restore)
    Value: !Ref DRPrivateSubnet1

  DRPrivateSubnet2Id:
    Description: Private subnet 2 (ECS tasks / Aurora restore)
    Value: !Ref DRPrivateSubnet2

  DRDbSubnetGroupName:
    Description: DB subnet group for restore-from-snapshot
    Value: !Ref DRDbSubnetGroup

  DRClusterSecurityGroupId:
    Description: Security group for restored Aurora cluster
    Value: !Ref DRClusterSecurityGroup

  DRAuroraKmsKeyArn:
    Description: KMS key ARN for encrypting restored clusters
    Value: !GetAtt DRAuroraKmsKey.Arn
