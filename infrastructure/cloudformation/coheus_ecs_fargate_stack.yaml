AWSTemplateFormatVersion: "2010-09-09"
Description: |
  Coheus ECS Fargate Backend Stack (Compute Only)

  This stack deploys:
  - VPC with public/private subnets (or uses existing)
  - ECS Fargate cluster and service
  - Application Load Balancer
  - CloudWatch monitoring and alarms

  Database: Deploy separately using coheus_aurora_cluster_stack.yaml

Parameters:
  ProjectName:
    Type: String
    Default: coheus
    Description: Project name for resource naming

  Environment:
    Type: String
    Default: prod
    AllowedValues:
      - dev
      - staging
      - prod
    Description: Environment name

  # Network Configuration
  NetworkMode:
    Type: String
    Default: new
    AllowedValues:
      - new
      - existing
    Description: Create new VPC or use existing

  ExistingVPCId:
    Type: String
    Default: ""
    Description: Existing VPC ID (required if NetworkMode=existing)

  ExistingPrivateSubnet1:
    Type: String
    Default: ""
    Description: Existing private subnet 1 (required if NetworkMode=existing)

  ExistingPrivateSubnet2:
    Type: String
    Default: ""
    Description: Existing private subnet 2 (required if NetworkMode=existing)

  ExistingPublicSubnet1:
    Type: String
    Default: ""
    Description: Existing public subnet 1 (required if NetworkMode=existing)

  ExistingPublicSubnet2:
    Type: String
    Default: ""
    Description: Existing public subnet 2 (required if NetworkMode=existing)

  # Container Configuration
  ContainerImageTag:
    Type: String
    Default: latest
    Description: Docker image tag to deploy

  ContainerPort:
    Type: Number
    Default: 3001
    Description: Port the container listens on

  ContainerCpu:
    Type: Number
    Default: 2048
    AllowedValues:
      - 256
      - 512
      - 1024
      - 2048
      - 4096
    Description: CPU units (256 = 0.25 vCPU, 1024 = 1 vCPU)

  ContainerMemory:
    Type: Number
    Default: 4096
    AllowedValues:
      - 512
      - 1024
      - 2048
      - 4096
      - 8192
    Description: Memory in MB

  DesiredCount:
    Type: Number
    Default: 2
    MinValue: 0
    MaxValue: 20
    Description: Desired number of tasks (0 for initial deployment before image push)

  MinCount:
    Type: Number
    Default: 2
    MinValue: 0
    Description: Minimum tasks for auto-scaling (0 for initial deployment)

  MaxCount:
    Type: Number
    Default: 10
    MinValue: 1
    Description: Maximum tasks for auto-scaling

  # Aurora Database Configuration (required)
  AuroraEndpoint:
    Type: String
    Description: Aurora cluster endpoint (from Aurora stack output)

  AuroraSecretArn:
    Type: String
    Description: Secrets Manager ARN for Aurora credentials (from Aurora stack output)

  AuroraKmsKeyArn:
    Type: String
    Description: KMS key ARN used to encrypt the Aurora secret (from Aurora stack KMSKeyArn output). Required so ECS can decrypt the secret.

  # Application Configuration
  JwtSecret:
    Type: String
    NoEcho: true
    MinLength: 32
    Description: JWT signing secret (min 32 characters)

  FrontendUrl:
    Type: String
    Default: ""
    Description: Frontend URL for CORS

  # SSL Configuration
  CertificateArn:
    Type: String
    Default: ""
    Description: ACM certificate ARN for HTTPS (optional)

  # Alerts
  AlertEmail:
    Type: String
    Default: ""
    Description: Email for alerts (optional)

  # Cognito SSO Configuration
  CognitoUserPoolId:
    Type: String
    Default: ""
    Description: Cognito User Pool ID for SSO authentication

  CognitoClientId:
    Type: String
    Default: ""
    Description: Cognito App Client ID

  CognitoClientSecret:
    Type: String
    NoEcho: true
    Default: ""
    Description: Cognito App Client Secret

  CognitoDomain:
    Type: String
    Default: ""
    Description: Cognito domain (e.g., your-app.auth.us-east-2.amazoncognito.com)

  CognitoPasswordAuth:
    Type: String
    Default: "false"
    AllowedValues: ["true", "false"]
    Description: Enable Cognito for email/password auth (requires ALLOW_ADMIN_USER_PASSWORD_AUTH on app client)

  # FRED API (market rates)
  FredApiKey:
    Type: String
    NoEcho: true
    Default: ""
    Description: FRED API key for fetching mortgage market rates (optional)

Conditions:
  CreateNewVPC: !Equals [!Ref NetworkMode, "new"]
  IsDevEnvironment: !Equals [!Ref Environment, "dev"]
  HasCertificate: !Not [!Equals [!Ref CertificateArn, ""]]
  HasAlertEmail: !Not [!Equals [!Ref AlertEmail, ""]]
  HasCognito: !Not [!Equals [!Ref CognitoUserPoolId, ""]]

Rules:
  ExistingVPCRequiresSubnets:
    RuleCondition: !Equals [!Ref NetworkMode, "existing"]
    Assertions:
      - Assert: !Not [!Equals [!Ref ExistingVPCId, ""]]
        AssertDescription: ExistingVPCId is required when NetworkMode=existing
      - Assert: !Not [!Equals [!Ref ExistingPrivateSubnet1, ""]]
        AssertDescription: ExistingPrivateSubnet1 is required when NetworkMode=existing
      - Assert: !Not [!Equals [!Ref ExistingPrivateSubnet2, ""]]
        AssertDescription: ExistingPrivateSubnet2 is required when NetworkMode=existing
      - Assert: !Not [!Equals [!Ref ExistingPublicSubnet1, ""]]
        AssertDescription: ExistingPublicSubnet1 is required when NetworkMode=existing
      - Assert: !Not [!Equals [!Ref ExistingPublicSubnet2, ""]]
        AssertDescription: ExistingPublicSubnet2 is required when NetworkMode=existing

Resources:
  # ============================================================================
  # KMS Key for Encryption
  # ============================================================================
  EncryptionKey:
    Type: AWS::KMS::Key
    Properties:
      Description: !Sub "KMS key for ${ProjectName} ${Environment} encryption"
      EnableKeyRotation: true
      KeyPolicy:
        Version: "2012-10-17"
        Statement:
          - Sid: Enable IAM User Permissions
            Effect: Allow
            Principal:
              AWS: !Sub "arn:aws:iam::${AWS::AccountId}:root"
            Action: "kms:*"
            Resource: "*"
          - Sid: Allow CloudWatch Logs
            Effect: Allow
            Principal:
              Service: !Sub "logs.${AWS::Region}.amazonaws.com"
            Action:
              - "kms:Encrypt"
              - "kms:Decrypt"
              - "kms:GenerateDataKey*"
            Resource: "*"
      Tags:
        - Key: Name
          Value: !Sub "${ProjectName}-${Environment}-key"

  # ============================================================================
  # ECR Repository
  # ============================================================================
  ECRRepository:
    Type: AWS::ECR::Repository
    UpdateReplacePolicy: Retain
    DeletionPolicy: Retain
    Properties:
      RepositoryName: !If
        - IsDevEnvironment
        - !Sub "${ProjectName}-backend"
        - !Sub "${ProjectName}-${Environment}-backend"
      ImageScanningConfiguration:
        ScanOnPush: true
      EncryptionConfiguration:
        EncryptionType: AES256
      ImageTagMutability: MUTABLE
      LifecyclePolicy:
        LifecyclePolicyText: |
          {
            "rules": [
              {
                "rulePriority": 1,
                "description": "Keep last 10 images",
                "selection": {
                  "tagStatus": "any",
                  "countType": "imageCountMoreThan",
                  "countNumber": 10
                },
                "action": {
                  "type": "expire"
                }
              }
            ]
          }
      Tags:
        - Key: Name
          Value: !If
            - IsDevEnvironment
            - !Sub "${ProjectName}-backend"
            - !Sub "${ProjectName}-${Environment}-backend"

  # ============================================================================
  # VPC and Networking (Conditional)
  # ============================================================================
  VPC:
    Type: AWS::EC2::VPC
    Condition: CreateNewVPC
    Properties:
      CidrBlock: 10.0.0.0/16
      EnableDnsHostnames: true
      EnableDnsSupport: true
      Tags:
        - Key: Name
          Value: !Sub "${ProjectName}-${Environment}-vpc"

  PublicSubnet1:
    Type: AWS::EC2::Subnet
    Condition: CreateNewVPC
    Properties:
      VpcId: !Ref VPC
      AvailabilityZone: !Select [0, !GetAZs ""]
      CidrBlock: 10.0.10.0/24
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: !Sub "${ProjectName}-${Environment}-public-1"

  PublicSubnet2:
    Type: AWS::EC2::Subnet
    Condition: CreateNewVPC
    Properties:
      VpcId: !Ref VPC
      AvailabilityZone: !Select [1, !GetAZs ""]
      CidrBlock: 10.0.11.0/24
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: !Sub "${ProjectName}-${Environment}-public-2"

  PrivateSubnet1:
    Type: AWS::EC2::Subnet
    Condition: CreateNewVPC
    Properties:
      VpcId: !Ref VPC
      AvailabilityZone: !Select [0, !GetAZs ""]
      CidrBlock: 10.0.1.0/24
      Tags:
        - Key: Name
          Value: !Sub "${ProjectName}-${Environment}-private-1"

  PrivateSubnet2:
    Type: AWS::EC2::Subnet
    Condition: CreateNewVPC
    Properties:
      VpcId: !Ref VPC
      AvailabilityZone: !Select [1, !GetAZs ""]
      CidrBlock: 10.0.2.0/24
      Tags:
        - Key: Name
          Value: !Sub "${ProjectName}-${Environment}-private-2"

  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Condition: CreateNewVPC
    Properties:
      Tags:
        - Key: Name
          Value: !Sub "${ProjectName}-${Environment}-igw"

  InternetGatewayAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Condition: CreateNewVPC
    Properties:
      VpcId: !Ref VPC
      InternetGatewayId: !Ref InternetGateway

  NatGatewayEIP:
    Type: AWS::EC2::EIP
    Condition: CreateNewVPC
    DependsOn: InternetGatewayAttachment
    Properties:
      Domain: vpc
      Tags:
        - Key: Name
          Value: !Sub "${ProjectName}-${Environment}-nat-eip"

  NatGateway:
    Type: AWS::EC2::NatGateway
    Condition: CreateNewVPC
    Properties:
      AllocationId: !GetAtt NatGatewayEIP.AllocationId
      SubnetId: !Ref PublicSubnet1
      Tags:
        - Key: Name
          Value: !Sub "${ProjectName}-${Environment}-nat"

  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Condition: CreateNewVPC
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: !Sub "${ProjectName}-${Environment}-public-rt"

  DefaultPublicRoute:
    Type: AWS::EC2::Route
    Condition: CreateNewVPC
    DependsOn: InternetGatewayAttachment
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  PublicSubnet1RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Condition: CreateNewVPC
    Properties:
      SubnetId: !Ref PublicSubnet1
      RouteTableId: !Ref PublicRouteTable

  PublicSubnet2RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Condition: CreateNewVPC
    Properties:
      SubnetId: !Ref PublicSubnet2
      RouteTableId: !Ref PublicRouteTable

  PrivateRouteTable:
    Type: AWS::EC2::RouteTable
    Condition: CreateNewVPC
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: !Sub "${ProjectName}-${Environment}-private-rt"

  DefaultPrivateRoute:
    Type: AWS::EC2::Route
    Condition: CreateNewVPC
    Properties:
      RouteTableId: !Ref PrivateRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      NatGatewayId: !Ref NatGateway

  PrivateSubnet1RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Condition: CreateNewVPC
    Properties:
      SubnetId: !Ref PrivateSubnet1
      RouteTableId: !Ref PrivateRouteTable

  PrivateSubnet2RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Condition: CreateNewVPC
    Properties:
      SubnetId: !Ref PrivateSubnet2
      RouteTableId: !Ref PrivateRouteTable

  # ============================================================================
  # Security Groups
  # ============================================================================
  ALBSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for Application Load Balancer
      VpcId: !If [CreateNewVPC, !Ref VPC, !Ref ExistingVPCId]
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: 0.0.0.0/0
          Description: Allow HTTPS
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
          Description: Allow HTTP
      Tags:
        - Key: Name
          Value: !Sub "${ProjectName}-${Environment}-alb-sg"

  ECSSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for ECS tasks
      VpcId: !If [CreateNewVPC, !Ref VPC, !Ref ExistingVPCId]
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: !Ref ContainerPort
          ToPort: !Ref ContainerPort
          SourceSecurityGroupId: !Ref ALBSecurityGroup
          Description: Allow traffic from ALB
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0
          Description: Allow all outbound
      Tags:
        - Key: Name
          Value: !Sub "${ProjectName}-${Environment}-ecs-sg"

  # ============================================================================
  # Secrets Manager - JWT Secret
  # ============================================================================
  JWTSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub "${ProjectName}/${Environment}/jwt"
      Description: JWT signing secret
      KmsKeyId: !Ref EncryptionKey
      SecretString: !Sub '{"secret":"${JwtSecret}"}'

  # ============================================================================
  # Application Load Balancer
  # ============================================================================
  ApplicationLoadBalancer:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      Name: !Sub "${ProjectName}-${Environment}-alb"
      Type: application
      Scheme: internet-facing
      SecurityGroups:
        - !Ref ALBSecurityGroup
      Subnets:
        - !If [CreateNewVPC, !Ref PublicSubnet1, !Ref ExistingPublicSubnet1]
        - !If [CreateNewVPC, !Ref PublicSubnet2, !Ref ExistingPublicSubnet2]
      LoadBalancerAttributes:
        - Key: idle_timeout.timeout_seconds
          Value: "3600"
      Tags:
        - Key: Name
          Value: !Sub "${ProjectName}-${Environment}-alb"

  ALBTargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: !Sub "${ProjectName}-${Environment}-tg"
      Port: !Ref ContainerPort
      Protocol: HTTP
      VpcId: !If [CreateNewVPC, !Ref VPC, !Ref ExistingVPCId]
      TargetType: ip
      HealthCheckPath: /health
      HealthCheckIntervalSeconds: 30
      HealthyThresholdCount: 2
      UnhealthyThresholdCount: 5
      TargetGroupAttributes:
        - Key: deregistration_delay.timeout_seconds
          Value: "30"
        - Key: stickiness.enabled
          Value: "true"
        - Key: stickiness.type
          Value: lb_cookie
        - Key: stickiness.lb_cookie.duration_seconds
          Value: "86400"
      Tags:
        - Key: Name
          Value: !Sub "${ProjectName}-${Environment}-tg"

  ALBHTTPSListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Condition: HasCertificate
    Properties:
      LoadBalancerArn: !Ref ApplicationLoadBalancer
      Port: 443
      Protocol: HTTPS
      SslPolicy: ELBSecurityPolicy-TLS13-1-2-2021-06
      Certificates:
        - CertificateArn: !Ref CertificateArn
      DefaultActions:
        - Type: forward
          TargetGroupArn: !Ref ALBTargetGroup

  ALBHTTPListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref ApplicationLoadBalancer
      Port: 80
      Protocol: HTTP
      DefaultActions:
        - !If
          - HasCertificate
          - Type: redirect
            RedirectConfig:
              Protocol: HTTPS
              Port: "443"
              StatusCode: HTTP_301
          - Type: forward
            TargetGroupArn: !Ref ALBTargetGroup

  # ============================================================================
  # ECS Cluster and Service
  # ============================================================================
  ECSCluster:
    Type: AWS::ECS::Cluster
    Properties:
      ClusterName: !Sub "${ProjectName}-${Environment}-cluster"
      ClusterSettings:
        - Name: containerInsights
          Value: enabled
      Tags:
        - Key: Name
          Value: !Sub "${ProjectName}-${Environment}-cluster"

  ECSLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/ecs/${ProjectName}-${Environment}"
      RetentionInDays: 30
      KmsKeyId: !GetAtt EncryptionKey.Arn

  ECSTaskExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${ProjectName}-${Environment}-ecs-exec-role"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonECSTaskExecutionRolePolicy
      Policies:
        - PolicyName: SecretsAccess
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                Resource:
                  - !Ref AuroraSecretArn
                  - !Ref JWTSecret
              - Effect: Allow
                Action:
                  - kms:Decrypt
                Resource: !GetAtt EncryptionKey.Arn
              # Aurora secret is encrypted with Aurora stack's KMS key; ECS must decrypt to fetch DB credentials
              - Effect: Allow
                Action:
                  - kms:Decrypt
                Resource: !Ref AuroraKmsKeyArn

  ECSTaskRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${ProjectName}-${Environment}-ecs-task-role"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: TaskPolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                Resource:
                  - !Ref AuroraSecretArn
                  - !Ref JWTSecret
              - Effect: Allow
                Action:
                  - kms:Decrypt
                  - kms:Encrypt
                  - kms:GenerateDataKey
                Resource: !GetAtt EncryptionKey.Arn
              # ECS Exec permissions (for running migrations via aws ecs execute-command)
              - Effect: Allow
                Action:
                  - ssmmessages:CreateControlChannel
                  - ssmmessages:CreateDataChannel
                  - ssmmessages:OpenControlChannel
                  - ssmmessages:OpenDataChannel
                Resource: "*"
              - Effect: Allow
                Action:
                  - logs:CreateLogStream
                  - logs:DescribeLogGroups
                  - logs:DescribeLogStreams
                  - logs:PutLogEvents
                Resource: "*"
              - !If
                - HasCognito
                - Effect: Allow
                  Action:
                    - cognito-idp:AdminInitiateAuth
                    - cognito-idp:AdminRespondToAuthChallenge
                    - cognito-idp:AdminCreateUser
                    - cognito-idp:AdminDeleteUser
                    - cognito-idp:AdminSetUserPassword
                    - cognito-idp:AdminSetUserMFAPreference
                    - cognito-idp:AdminGetUser
                    - cognito-idp:AssociateSoftwareToken
                    - cognito-idp:VerifySoftwareToken
                    - cognito-idp:ForgotPassword
                    - cognito-idp:ConfirmForgotPassword
                  Resource: !Sub "arn:aws:cognito-idp:${AWS::Region}:${AWS::AccountId}:userpool/${CognitoUserPoolId}"
                - !Ref "AWS::NoValue"

  ECSTaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: !Sub "${ProjectName}-${Environment}-backend"
      NetworkMode: awsvpc
      RequiresCompatibilities:
        - FARGATE
      Cpu: !Ref ContainerCpu
      Memory: !Ref ContainerMemory
      ExecutionRoleArn: !GetAtt ECSTaskExecutionRole.Arn
      TaskRoleArn: !GetAtt ECSTaskRole.Arn
      ContainerDefinitions:
        - Name: !Sub "${ProjectName}-backend"
          Image: !Sub "${AWS::AccountId}.dkr.ecr.${AWS::Region}.amazonaws.com/${ECRRepository}:${ContainerImageTag}"
          Essential: true
          PortMappings:
            - ContainerPort: !Ref ContainerPort
              Protocol: tcp
          Command:
            - "npm"
            - "start"
          Environment:
            - Name: NODE_OPTIONS
              Value: "--max-old-space-size=3584"
            - Name: NODE_ENV
              Value: production
            - Name: PORT
              Value: !Ref ContainerPort
            - Name: DEPLOYMENT_MODE
              Value: saas
            - Name: MULTI_TENANT_ENABLED
              Value: "true"
            - Name: DB_HOST
              Value: !Ref AuroraEndpoint
            - Name: DB_PORT
              Value: "5432"
            - Name: DB_NAME
              Value: coheus_management
            - Name: DB_SSL
              Value: "true"
            - Name: FRONTEND_URL
              Value: !Ref FrontendUrl
            - Name: KMS_KEY_ID
              Value: !Ref EncryptionKey
            - Name: AWS_REGION
              Value: !Ref AWS::Region
            - Name: JWT_SECRET
              Value: !Ref JwtSecret
            # Cognito SSO Configuration (optional)
            - Name: COGNITO_USER_POOL_ID
              Value: !If [HasCognito, !Ref CognitoUserPoolId, ""]
            - Name: COGNITO_CLIENT_ID
              Value: !If [HasCognito, !Ref CognitoClientId, ""]
            - Name: COGNITO_CLIENT_SECRET
              Value: !If [HasCognito, !Ref CognitoClientSecret, ""]
            - Name: COGNITO_REGION
              Value: !If [HasCognito, !Ref AWS::Region, ""]
            - Name: COGNITO_DOMAIN
              Value: !If [HasCognito, !Ref CognitoDomain, ""]
            - Name: COGNITO_PASSWORD_AUTH
              Value: !If [HasCognito, !Ref CognitoPasswordAuth, "false"]
            # FRED API for market rate data
            - Name: FRED_API_KEY
              Value: !Ref FredApiKey
          Secrets:
            - Name: DB_USER
              ValueFrom: !Sub "${AuroraSecretArn}:username::"
            - Name: DB_PASSWORD
              ValueFrom: !Sub "${AuroraSecretArn}:password::"
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Ref ECSLogGroup
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: !Ref ProjectName
          HealthCheck:
            Command:
              - CMD-SHELL
              - !Sub "wget --no-verbose --tries=1 --spider http://localhost:${ContainerPort}/health || exit 1"
            Interval: 30
            Timeout: 10
            Retries: 5
            StartPeriod: 120
      Tags:
        - Key: Name
          Value: !Sub "${ProjectName}-${Environment}-task"

  ECSService:
    Type: AWS::ECS::Service
    DependsOn:
      - ALBHTTPListener
    Properties:
      ServiceName: !Sub "${ProjectName}-${Environment}-service"
      Cluster: !Ref ECSCluster
      TaskDefinition: !Ref ECSTaskDefinition
      DesiredCount: !Ref DesiredCount
      LaunchType: FARGATE
      EnableExecuteCommand: true # Enables ECS Exec for running migrations
      NetworkConfiguration:
        AwsvpcConfiguration:
          Subnets:
            - !If [
                CreateNewVPC,
                !Ref PrivateSubnet1,
                !Ref ExistingPrivateSubnet1,
              ]
            - !If [
                CreateNewVPC,
                !Ref PrivateSubnet2,
                !Ref ExistingPrivateSubnet2,
              ]
          SecurityGroups:
            - !Ref ECSSecurityGroup
          AssignPublicIp: DISABLED
      LoadBalancers:
        - ContainerName: !Sub "${ProjectName}-backend"
          ContainerPort: !Ref ContainerPort
          TargetGroupArn: !Ref ALBTargetGroup
      DeploymentConfiguration:
        MaximumPercent: 200
        MinimumHealthyPercent: 100
        DeploymentCircuitBreaker:
          Enable: true
          Rollback: true
      Tags:
        - Key: Name
          Value: !Sub "${ProjectName}-${Environment}-service"

  # ============================================================================
  # Auto Scaling
  # ============================================================================
  ECSAutoScalingTarget:
    Type: AWS::ApplicationAutoScaling::ScalableTarget
    Properties:
      MaxCapacity: !Ref MaxCount
      MinCapacity: !Ref MinCount
      ResourceId: !Sub "service/${ECSCluster}/${ECSService.Name}"
      RoleARN: !Sub "arn:aws:iam::${AWS::AccountId}:role/aws-service-role/ecs.application-autoscaling.amazonaws.com/AWSServiceRoleForApplicationAutoScaling_ECSService"
      ScalableDimension: ecs:service:DesiredCount
      ServiceNamespace: ecs

  ECSCPUScalingPolicy:
    Type: AWS::ApplicationAutoScaling::ScalingPolicy
    Properties:
      PolicyName: !Sub "${ProjectName}-${Environment}-cpu-scaling"
      PolicyType: TargetTrackingScaling
      ScalingTargetId: !Ref ECSAutoScalingTarget
      TargetTrackingScalingPolicyConfiguration:
        PredefinedMetricSpecification:
          PredefinedMetricType: ECSServiceAverageCPUUtilization
        TargetValue: 70
        ScaleInCooldown: 300
        ScaleOutCooldown: 60

  ECSMemoryScalingPolicy:
    Type: AWS::ApplicationAutoScaling::ScalingPolicy
    Properties:
      PolicyName: !Sub "${ProjectName}-${Environment}-memory-scaling"
      PolicyType: TargetTrackingScaling
      ScalingTargetId: !Ref ECSAutoScalingTarget
      TargetTrackingScalingPolicyConfiguration:
        PredefinedMetricSpecification:
          PredefinedMetricType: ECSServiceAverageMemoryUtilization
        TargetValue: 80
        ScaleInCooldown: 300
        ScaleOutCooldown: 60

  # ============================================================================
  # CloudWatch Alarms
  # ============================================================================
  AlertsTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: !Sub "${ProjectName}-${Environment}-alerts"
      DisplayName: !Sub "${ProjectName} ${Environment} Alerts"

  AlertsEmailSubscription:
    Type: AWS::SNS::Subscription
    Condition: HasAlertEmail
    Properties:
      TopicArn: !Ref AlertsTopic
      Protocol: email
      Endpoint: !Ref AlertEmail

  ECSCPUAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub "${ProjectName}-${Environment}-ecs-cpu-high"
      AlarmDescription: ECS CPU utilization is high
      MetricName: CPUUtilization
      Namespace: AWS/ECS
      Statistic: Average
      Period: 300
      EvaluationPeriods: 3
      Threshold: 85
      ComparisonOperator: GreaterThanThreshold
      Dimensions:
        - Name: ClusterName
          Value: !Ref ECSCluster
        - Name: ServiceName
          Value: !GetAtt ECSService.Name
      AlarmActions:
        - !Ref AlertsTopic
      OKActions:
        - !Ref AlertsTopic

  ECSMemoryAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub "${ProjectName}-${Environment}-ecs-memory-high"
      AlarmDescription: ECS memory utilization is high
      MetricName: MemoryUtilization
      Namespace: AWS/ECS
      Statistic: Average
      Period: 300
      EvaluationPeriods: 3
      Threshold: 85
      ComparisonOperator: GreaterThanThreshold
      Dimensions:
        - Name: ClusterName
          Value: !Ref ECSCluster
        - Name: ServiceName
          Value: !GetAtt ECSService.Name
      AlarmActions:
        - !Ref AlertsTopic

Outputs:
  ECRRepositoryUri:
    Description: ECR repository URI
    Value: !Sub "${AWS::AccountId}.dkr.ecr.${AWS::Region}.amazonaws.com/${ECRRepository}"
    Export:
      Name: !Sub "${ProjectName}-${Environment}-ecr-uri"

  ECRRepositoryName:
    Description: ECR repository name
    Value: !Ref ECRRepository

  VPCId:
    Description: VPC ID
    Value: !If [CreateNewVPC, !Ref VPC, !Ref ExistingVPCId]
    Export:
      Name: !Sub "${ProjectName}-${Environment}-vpc-id"

  PrivateSubnet1:
    Description: Private subnet 1 ID
    Value: !If [CreateNewVPC, !Ref PrivateSubnet1, !Ref ExistingPrivateSubnet1]
    Export:
      Name: !Sub "${ProjectName}-${Environment}-private-subnet-1"

  PrivateSubnet2:
    Description: Private subnet 2 ID
    Value: !If [CreateNewVPC, !Ref PrivateSubnet2, !Ref ExistingPrivateSubnet2]
    Export:
      Name: !Sub "${ProjectName}-${Environment}-private-subnet-2"

  ECSClusterName:
    Description: ECS cluster name
    Value: !Ref ECSCluster

  ECSServiceName:
    Description: ECS service name
    Value: !GetAtt ECSService.Name

  ECSSecurityGroupId:
    Description: ECS security group ID (add to Aurora cluster allowed SGs)
    Value: !Ref ECSSecurityGroup
    Export:
      Name: !Sub "${ProjectName}-${Environment}-ecs-sg"

  ALBDNSName:
    Description: Application Load Balancer DNS name
    Value: !GetAtt ApplicationLoadBalancer.DNSName

  ALBFullName:
    Description: ALB full name for CloudWatch metrics
    Value: !GetAtt ApplicationLoadBalancer.LoadBalancerFullName
    Export:
      Name: !Sub "${ProjectName}-${Environment}-alb-full-name"

  TargetGroupFullName:
    Description: Target group full name for CloudWatch metrics
    Value: !GetAtt ALBTargetGroup.TargetGroupFullName
    Export:
      Name: !Sub "${ProjectName}-${Environment}-tg-full-name"

  ALBHostedZoneId:
    Description: ALB hosted zone ID (for Route 53)
    Value: !GetAtt ApplicationLoadBalancer.CanonicalHostedZoneID

  KMSKeyArn:
    Description: KMS key ARN
    Value: !GetAtt EncryptionKey.Arn
    Export:
      Name: !Sub "${ProjectName}-${Environment}-kms-key"

  AlertsTopicArn:
    Description: SNS alerts topic ARN
    Value: !Ref AlertsTopic

  BackendURL:
    Description: Backend API URL
    Value: !If
      - HasCertificate
      - !Sub "https://${ApplicationLoadBalancer.DNSName}"
      - !Sub "http://${ApplicationLoadBalancer.DNSName}"
