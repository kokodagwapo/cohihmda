Outputs:
  RestApiId:
    Description: REST API Gateway ID
    Value: !Ref RestApi
    Export:
      Name: !Sub '${AWS::StackName}-RestApiId'

  RestApiUrl:
    Description: REST API Gateway URL
    Value: !Sub 'https://${RestApi}.execute-api.${AWS::Region}.amazonaws.com/${Stage}'
    Export:
      Name: !Sub '${AWS::StackName}-RestApiUrl'

  ApiGatewayRestUrl:
    Description: API Gateway REST URL for Lambda functions (alias for RestApiUrl)
    Value: !Sub 'https://${RestApi}.execute-api.${AWS::Region}.amazonaws.com/${Stage}'
    Export:
      Name: !Sub '${AWS::StackName}-ApiGatewayRestUrl'

  WebSocketApiId:
    Description: WebSocket API Gateway ID
    Value: !Ref WebSocketApi
    Export:
      Name: !Sub '${AWS::StackName}-WebSocketApiId'

  WebSocketApiUrl:
    Description: WebSocket API Gateway URL
    Value: !Sub 'wss://${WebSocketApi}.execute-api.${AWS::Region}.amazonaws.com/${Stage}'
    Export:
      Name: !Sub '${AWS::StackName}-WebSocketApiUrl'

  DynamoDBTableName:
    Description: DynamoDB table name for WebSocket connections
    Value: !Ref WebSocketConnectionsTable
    Export:
      Name: !Sub '${AWS::StackName}-DynamoDBTableName'

  LambdaDeploymentBucketName:
    Description: S3 bucket name for Lambda deployment packages
    Value: !Ref LambdaDeploymentBucket
    Export:
      Name: !Sub '${AWS::StackName}-LambdaDeploymentBucket'

