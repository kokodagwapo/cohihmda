<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Coheus</title>
    <link rel="icon" href="/coheus/coheus-logo.png" type="image/png" />
    <link rel="shortcut icon" href="/coheus/coheus-logo.png" type="image/png" />
    <script type="text/javascript">
      // SPA redirect for GitHub Pages
      // Redirect all 404s to index.html with the original path preserved
      var path = window.location.pathname;
      var search = window.location.search;
      var hash = window.location.hash;
      
      // Remove /coheus/ prefix if present to get the actual route
      var route = path.replace(/^\/coheus\//, '/');
      if (route === '/coheus' || route === '/coheus/') {
        route = '/';
      }
      
      // Store the intended path and redirect to index
      // App.tsx looks for 'react_router_path' in sessionStorage
      sessionStorage.setItem('react_router_path', route + search + hash);
      window.location.replace('/coheus/');
    </script>
  </head>
  <body>
    <noscript>
      <meta http-equiv="refresh" content="0;url=/coheus/">
    </noscript>
  </body>
</html>
