# ============================================================================
# Bitbucket Pipelines Configuration for Coheus
# ============================================================================
# Deployment triggers:
#   - dev branch   → Deploy to dev environment
#   - main branch  → Deploy to production environment
#
# Authentication: AWS OIDC (no static credentials needed)
#
# Required Repository Variables:
#   - AWS_ROLE_ARN                 - IAM role ARN for OIDC
#   - AWS_REGION                   - AWS region (default: us-east-2)
#
# Required Deployment Variables (per environment: dev, production):
#   - S3_BUCKET                    - Frontend S3 bucket name
#   - CLOUDFRONT_DISTRIBUTION_ID   - For cache invalidation
#   - ECR_REPOSITORY_URI           - ECR repository for backend images
#   - ECS_CLUSTER                  - ECS cluster name
#   - ECS_SERVICE                  - ECS service name
#   - VITE_API_URL                 - Backend API URL for frontend build
# ============================================================================

image: node:20

options:
  docker: true
  size: 2x

definitions:
  caches:
    npm: ~/.npm
    server-npm: server/node_modules

  services:
    docker:
      memory: 3072

  scripts:
    setup-oidc: &setup-oidc |
      echo "Setting up AWS credentials using OIDC..."
      echo $BITBUCKET_STEP_OIDC_TOKEN > /tmp/oidc-token
      chmod 600 /tmp/oidc-token
      if [ -z "$AWS_ROLE_ARN" ]; then
        echo "ERROR: AWS_ROLE_ARN repository variable is not set"
        exit 1
      fi
      export AWS_WEB_IDENTITY_TOKEN_FILE=/tmp/oidc-token
      export AWS_ROLE_SESSION_NAME="bitbucket-coheus-${BITBUCKET_DEPLOYMENT_ENVIRONMENT:-build}-${BITBUCKET_BUILD_NUMBER}"
      export AWS_REGION="${AWS_REGION:-us-east-2}"
      echo "Using AWS Role: $AWS_ROLE_ARN"

  steps:
    # Build steps (no deployment environment)
    - step: &build-frontend
        name: Build Frontend
        caches:
          - npm
        script:
          - npm ci
          - npm run build
        artifacts:
          - docs/**

    - step: &build-backend
        name: Build Backend
        caches:
          - server-npm
        script:
          - cd server && npm ci && npm run build
        artifacts:
          - server/dist/**
          - server/node_modules/**
          - server/package.json

    # Deploy steps
    - step: &deploy-dev
        name: Deploy to Dev
        oidc: true
        deployment: dev
        services:
          - docker
        script:
          - *setup-oidc
          - chmod +x ./scripts/bitbucket/deploy-frontend.sh
          - ./scripts/bitbucket/deploy-frontend.sh
          - chmod +x ./scripts/bitbucket/deploy-backend-ecs.sh
          - ./scripts/bitbucket/deploy-backend-ecs.sh

    - step: &deploy-prod
        name: Deploy to Production
        oidc: true
        deployment: production
        trigger: manual
        services:
          - docker
        script:
          - *setup-oidc
          - chmod +x ./scripts/bitbucket/deploy-frontend.sh
          - ./scripts/bitbucket/deploy-frontend.sh
          - chmod +x ./scripts/bitbucket/deploy-backend-ecs.sh
          - ./scripts/bitbucket/deploy-backend-ecs.sh

    # Individual deploy steps for custom pipelines
    - step: &deploy-frontend-dev
        name: Deploy Frontend to Dev
        oidc: true
        deployment: dev
        script:
          - *setup-oidc
          - chmod +x ./scripts/bitbucket/deploy-frontend.sh
          - ./scripts/bitbucket/deploy-frontend.sh

    - step: &deploy-frontend-prod
        name: Deploy Frontend to Prod
        oidc: true
        deployment: production
        trigger: manual
        script:
          - *setup-oidc
          - chmod +x ./scripts/bitbucket/deploy-frontend.sh
          - ./scripts/bitbucket/deploy-frontend.sh

    - step: &deploy-backend-dev
        name: Deploy Backend to Dev
        oidc: true
        deployment: dev
        services:
          - docker
        script:
          - *setup-oidc
          - chmod +x ./scripts/bitbucket/deploy-backend-ecs.sh
          - ./scripts/bitbucket/deploy-backend-ecs.sh

    - step: &deploy-backend-prod
        name: Deploy Backend to Prod
        oidc: true
        deployment: production
        trigger: manual
        services:
          - docker
        script:
          - *setup-oidc
          - chmod +x ./scripts/bitbucket/deploy-backend-ecs.sh
          - ./scripts/bitbucket/deploy-backend-ecs.sh

pipelines:
  # Branch-based deployments
  branches:
    dev:
      - parallel:
          - step: *build-frontend
          - step: *build-backend
      - step: *deploy-dev

    main:
      - parallel:
          - step: *build-frontend
          - step: *build-backend
      - step: *deploy-prod

  # Pull request validation
  pull-requests:
    "**":
      - parallel:
          - step: *build-frontend
          - step: *build-backend

  # Custom pipelines for individual deployments
  custom:
    # Frontend only
    frontend-dev:
      - step: *build-frontend
      - step: *deploy-frontend-dev

    frontend-prod:
      - step: *build-frontend
      - step: *deploy-frontend-prod

    # Backend only
    backend-dev:
      - step: *build-backend
      - step: *deploy-backend-dev

    backend-prod:
      - step: *build-backend
      - step: *deploy-backend-prod

    # Full deploy (skip build if you want)
    deploy-all-dev:
      - parallel:
          - step: *build-frontend
          - step: *build-backend
      - step: *deploy-dev

    deploy-all-prod:
      - parallel:
          - step: *build-frontend
          - step: *build-backend
      - step: *deploy-prod

    # Database migrations
    run-migrations-dev:
      - step:
          name: Run Migrations (Dev)
          oidc: true
          deployment: dev
          script:
            - *setup-oidc
            - apt-get update && apt-get install -y curl
            - chmod +x ./scripts/bitbucket/run-migrations.sh
            - ./scripts/bitbucket/run-migrations.sh

    run-migrations-prod:
      - step:
          name: Run Migrations (Prod)
          oidc: true
          deployment: production
          trigger: manual
          script:
            - *setup-oidc
            - apt-get update && apt-get install -y curl
            - chmod +x ./scripts/bitbucket/run-migrations.sh
            - ./scripts/bitbucket/run-migrations.sh
