# ============================================================================
# Bitbucket Pipelines Configuration for Coheus
# ============================================================================
# Deployment triggers:
#   - dev branch   → Deploy to dev environment
#   - main branch  → Deploy to production environment
#
# Authentication: AWS OIDC (no static credentials needed)
#
# Required Repository Variables:
#   - AWS_ROLE_ARN                 - IAM role ARN for OIDC
#   - AWS_REGION                   - AWS region (default: us-east-2)
#
# Required Deployment Variables (per environment: dev, production):
#   - S3_BUCKET                    - Frontend S3 bucket name
#   - CLOUDFRONT_DISTRIBUTION_ID   - For cache invalidation
#   - ECR_REPOSITORY_URI           - ECR repository for backend images
#   - VITE_API_URL                 - Backend API URL for frontend build
#   - CF_STACK_BACKEND             - CloudFormation stack name (e.g., coheus-dev-backend)
#   - COGNITO_PASSWORD_AUTH        - Set to "true" (Cognito-only password auth policy)
#   - E2E_ADMIN_EMAIL / E2E_ADMIN_PASSWORD / E2E_ADMIN_TOTP_SECRET
#   - E2E_PLATFORM_ADMIN_EMAIL / E2E_PLATFORM_ADMIN_PASSWORD / E2E_PLATFORM_ADMIN_TOTP_SECRET
#       Optional. Platform-admin (coheus_users.role='platform_admin' or 'super_admin') account
#       used by the AI AC Validator for ACs that target platform-scoped admin routes
#       (/api/admin/global-knowledge/*, /api/admin/platform-settings/*, /api/admin/ai-prompts/*,
#       /api/admin/release-notes/*, /api/admin/insight-feedback/*, /api/admin/tenant-config-transfer/*).
#       MUST use a different email than E2E_ADMIN_EMAIL to avoid cross-table login ambiguity.
#       If unset, platform-scoped admin ACs will 403 but the pipeline will continue.
#   - CONFLUENCE_QA_PARENT_PAGE_ID - Parent Confluence page for per-issue QA pages
#   - QA_JIRA_PROJECT_KEY          - Jira project used for issue resolution and bug creation
#   - QA_COMMIT_RANGE              - Optional explicit git range for Jira-key discovery
#   - QA_COMMIT_LOOKBACK           - Fallback commit lookback window when no range is provided
#   - QA_ENABLE_AC_VALIDATOR       - Optional; defaults to "false" and enables Jira AC validation when true
#   - QA_AC_MAX_STEPS_PER_ISSUE    - Optional override for the AI plan-validator per-issue step cap (default 25)
#   - QA_AC_MAX_WRITES_PER_ISSUE   - Optional override for the AC validator per-issue write-action cap (default 10)
#   - QA_AC_MAX_WRITES_PER_RUN     - Optional override for the AC validator aggregate write-action cap per pipeline run (default 25)
#   - ATLASSIAN_EMAIL / ATLASSIAN_SITE_URL
#   - Atlassian API token is fetched from Secrets Manager via backend stack output
#   - (Optional) E2E_MANAGED_EMAIL_PREFIX      - defaults to "e2e.auto"
#
# DR / failover custom pipelines (manual trigger):
#   dr-failover-dev/prod — one-click: auto-finds snapshot, restores Aurora, deploys ECS,
#     runs health check, publishes Confluence test report.
#     Variables: DR_AWS_REGION (default us-east-1). Everything else auto-resolved.
#     For Confluence report: ATLASSIAN_EMAIL, ATLASSIAN_SITE_URL (reuse from QA deployment),
#       DR_CONFLUENCE_PARENT_PAGE_ID (default 1379270657). Token fetched from Secrets Manager.
#   dr-deploy-backend-dev/prod — backend-only (requires all DR_* vars below, use for reruns).
#     DR_AURORA_ENDPOINT, DR_AURORA_SECRET_ARN, DR_IMAGE_TAG, DR_JWT_SECRET,
#     DR_CERTIFICATE_ARN, DR_COGNITO_*, DR_FRONTEND_URL, optional DR_OPENAI_SECRET_ARN
#   dr-deploy-frontend-dev/prod — DR_S3_FRONTEND_BUCKET, CLOUDFRONT_DISTRIBUTION_ID
#   dr-run-migrations-dev — DR_ECS_CLUSTER, DR_ECS_SERVICE
#   dr-teardown-compute-dev — no extra vars (reads stack names from environment)
# ============================================================================

image: node:20

options:
  docker: true
  size: 2x

clone:
  depth: full

definitions:
  caches:
    npm: ~/.npm
    server-npm: server/node_modules

  services:
    docker:
      memory: 3072
    postgres:
      image: postgres:15
      variables:
        POSTGRES_DB: coheus_test
        POSTGRES_USER: postgres
        POSTGRES_PASSWORD: postgres

  scripts:
    setup-oidc: &setup-oidc |
      echo "Setting up AWS credentials using OIDC..."
      echo $BITBUCKET_STEP_OIDC_TOKEN > /tmp/oidc-token
      chmod 600 /tmp/oidc-token
      if [ -z "$AWS_ROLE_ARN" ]; then
        echo "ERROR: AWS_ROLE_ARN repository variable is not set"
        exit 1
      fi
      export AWS_WEB_IDENTITY_TOKEN_FILE=/tmp/oidc-token
      export AWS_ROLE_SESSION_NAME="bitbucket-coheus-${BITBUCKET_DEPLOYMENT_ENVIRONMENT:-build}-${BITBUCKET_BUILD_NUMBER}"
      export AWS_REGION="${AWS_REGION:-us-east-2}"
      echo "Using AWS Role: $AWS_ROLE_ARN"

    e2e-env-preflight: &e2e-env-preflight |
      echo "Running E2E environment preflight..."
      required_vars="E2E_BASE_URL E2E_ADMIN_EMAIL E2E_ADMIN_PASSWORD E2E_ADMIN_TOTP_SECRET"
      for name in $required_vars; do
        value=$(printenv "$name" || true)
        if [ -z "$value" ]; then
          echo "ERROR: Missing required variable $name"
          exit 1
        fi
        case "$value" in
          \$*)
            echo "ERROR: Variable $name appears to be a literal placeholder ($value). Set the actual secret/value."
            exit 1
            ;;
        esac
      done
      echo "E2E environment preflight passed."

  steps:
    # Build steps (no deployment environment)
    - step: &build-frontend
        name: Build Frontend
        caches:
          - npm
        script:
          - npm ci
          - npm run build
        artifacts:
          - dist/**

    - step: &build-backend
        name: Build Backend
        caches:
          - server-npm
        script:
          - cd server && npm ci && npm run build
          - echo "Build validation passed (Docker build in deploy step compiles from source)"

    - step: &test-frontend
        name: Test Frontend
        caches:
          - npm
        script:
          - npm ci
          - npm run test:run

    - step: &test-backend
        name: Test Backend
        caches:
          - server-npm
        script:
          - cd server && npm ci && npm run test:run

    - step: &test-backend-integration
        name: Test Backend RBAC Integration
        caches:
          - server-npm
        services:
          - postgres
        script:
          - cd server && npm ci && npm run test:integration

    - step: &lint-test-tags
        name: Lint QA Test Tags
        caches:
          - server-npm
        script:
          - cd server && npm ci && npm run lint:test-tags

    - step: &test-e2e-smoke
        name: Test E2E Smoke (Chromium)
        # Keep Playwright Docker image pinned and centralized via YAML anchor.
        image: &playwright_docker_image mcr.microsoft.com/playwright:v1.58.2-noble
        caches:
          - npm
        script:
          - npm ci
          - *e2e-env-preflight
          - npm run test:e2e:smoke
        artifacts:
          - playwright-report/**
          - test-results/**

    - step: &test-e2e-critical
        name: Test E2E Critical
        image: *playwright_docker_image
        caches:
          - npm
        script:
          - npm ci
          - *e2e-env-preflight
          - npm run test:e2e:critical
        artifacts:
          - playwright-report/**
          - test-results/**

    - step: &test-e2e-regression
        name: Test E2E Regression (Cross-browser)
        image: *playwright_docker_image
        caches:
          - npm
        script:
          - npm ci
          - *e2e-env-preflight
          - npm run test:e2e:regression
        artifacts:
          - playwright-report/**
          - test-results/**

    - step: &test-e2e-prod-smoke
        name: Test E2E Prod Smoke (Manual)
        image: *playwright_docker_image
        deployment: production
        caches:
          - npm
        script:
          - npm ci
          - *e2e-env-preflight
          - npm run test:e2e:smoke
        artifacts:
          - playwright-report/**
          - test-results/**

    # Deploy steps with automatic change detection
    - step: &deploy-dev
        name: Deploy to Dev
        oidc: true
        deployment: dev
        services:
          - docker
        script:
          - *setup-oidc
          # Check what changed in this commit
          - |
            FRONTEND_CHANGED=$(git diff --name-only HEAD~1 HEAD | grep -E '^(src/|public/|index\.html|package\.json|vite\.config|tailwind\.config|tsconfig)' || true)
            BACKEND_CHANGED=$(git diff --name-only HEAD~1 HEAD | grep -E '^(server/|Dockerfile\.backend)' || true)
            INFRA_CHANGED=$(git diff --name-only HEAD~1 HEAD | grep -E '^(infrastructure/cloudformation/|scripts/deploy/config|scripts/bitbucket/|bitbucket-pipelines\.yml)' || true)
            echo "Frontend changed: ${FRONTEND_CHANGED:-none}"
            echo "Backend changed: ${BACKEND_CHANGED:-none}"
            echo "Infrastructure changed: ${INFRA_CHANGED:-none}"
          # Deploy infrastructure first if changed (updates task definitions, memory, etc.)
          - |
            if [ -n "$INFRA_CHANGED" ]; then
              echo ">>> Deploying Infrastructure (CloudFormation)..."
              chmod +x ./scripts/bitbucket/deploy-infrastructure.sh
              ./scripts/bitbucket/deploy-infrastructure.sh
            else
              echo ">>> Skipping Infrastructure (no changes)"
            fi
          # Deploy frontend if changed (or if infra changed - ensures no stale frontend after partial failures)
          - |
            if [ -n "$FRONTEND_CHANGED" ] || [ -n "$INFRA_CHANGED" ]; then
              echo ">>> Deploying Frontend..."
              chmod +x ./scripts/bitbucket/deploy-frontend.sh
              ./scripts/bitbucket/deploy-frontend.sh
            else
              echo ">>> Skipping Frontend (no changes)"
            fi
          # Deploy backend if changed (or if infra changed - to pick up new task definition)
          - |
            if [ -n "$BACKEND_CHANGED" ] || [ -n "$INFRA_CHANGED" ]; then
              echo ">>> Deploying Backend..."
              chmod +x ./scripts/bitbucket/deploy-backend-ecs.sh
              ./scripts/bitbucket/deploy-backend-ecs.sh
            else
              echo ">>> Skipping Backend (no changes)"
            fi
          # Auto-migrate after backend deploy. Runner is idempotent (tracks applied
          # versions in schema_migrations), so re-runs are safe on every deploy.
          - |
            if [ -n "$BACKEND_CHANGED" ] || [ -n "$INFRA_CHANGED" ]; then
              echo ">>> Running database migrations..."
              apt-get update -qq && apt-get install -y -qq curl
              chmod +x ./scripts/bitbucket/run-migrations.sh
              ./scripts/bitbucket/run-migrations.sh
            else
              echo ">>> Skipping Migrations (no backend/infra changes)"
            fi
          # Idempotent DB job — run on every dev deploy so frontend-only pushes still backfill.
          - |
            echo ">>> Backfilling unified chat legacy research sessions (dev)..."
            apt-get update -qq && apt-get install -y -qq curl
            chmod +x ./scripts/bitbucket/run-unified-chat-backfill.sh
            ./scripts/bitbucket/run-unified-chat-backfill.sh

    - step: &deploy-prod
        name: Deploy to Production
        oidc: true
        deployment: production
        trigger: manual
        services:
          - docker
        script:
          - *setup-oidc
          # Check what changed in this commit
          - |
            FRONTEND_CHANGED=$(git diff --name-only HEAD~1 HEAD | grep -E '^(src/|public/|index\.html|package\.json|vite\.config|tailwind\.config|tsconfig)' || true)
            BACKEND_CHANGED=$(git diff --name-only HEAD~1 HEAD | grep -E '^(server/|Dockerfile\.backend)' || true)
            INFRA_CHANGED=$(git diff --name-only HEAD~1 HEAD | grep -E '^(infrastructure/cloudformation/|scripts/deploy/config|scripts/bitbucket/|bitbucket-pipelines\.yml)' || true)
            echo "Frontend changed: ${FRONTEND_CHANGED:-none}"
            echo "Backend changed: ${BACKEND_CHANGED:-none}"
            echo "Infrastructure changed: ${INFRA_CHANGED:-none}"
          # Deploy infrastructure first if changed (updates task definitions, memory, etc.)
          - |
            if [ -n "$INFRA_CHANGED" ]; then
              echo ">>> Deploying Infrastructure (CloudFormation)..."
              chmod +x ./scripts/bitbucket/deploy-infrastructure.sh
              ./scripts/bitbucket/deploy-infrastructure.sh
            else
              echo ">>> Skipping Infrastructure (no changes)"
            fi
          # Deploy frontend if changed (or if infra changed - ensures no stale frontend after partial failures)
          - |
            if [ -n "$FRONTEND_CHANGED" ] || [ -n "$INFRA_CHANGED" ]; then
              echo ">>> Deploying Frontend..."
              chmod +x ./scripts/bitbucket/deploy-frontend.sh
              ./scripts/bitbucket/deploy-frontend.sh
            else
              echo ">>> Skipping Frontend (no changes)"
            fi
          # Deploy backend if changed (or if infra changed - to pick up new task definition)
          - |
            if [ -n "$BACKEND_CHANGED" ] || [ -n "$INFRA_CHANGED" ]; then
              echo ">>> Deploying Backend..."
              chmod +x ./scripts/bitbucket/deploy-backend-ecs.sh
              ./scripts/bitbucket/deploy-backend-ecs.sh
            else
              echo ">>> Skipping Backend (no changes)"
            fi

    # Individual deploy steps for custom pipelines
    - step: &deploy-frontend-dev
        name: Deploy Frontend to Dev
        oidc: true
        deployment: dev
        script:
          - *setup-oidc
          - chmod +x ./scripts/bitbucket/deploy-frontend.sh
          - ./scripts/bitbucket/deploy-frontend.sh

    - step: &deploy-frontend-prod
        name: Deploy Frontend to Prod
        oidc: true
        deployment: production
        trigger: manual
        script:
          - *setup-oidc
          - chmod +x ./scripts/bitbucket/deploy-frontend.sh
          - ./scripts/bitbucket/deploy-frontend.sh

    - step: &deploy-backend-dev
        name: Deploy Backend to Dev
        oidc: true
        deployment: dev
        services:
          - docker
        script:
          - *setup-oidc
          - chmod +x ./scripts/bitbucket/deploy-backend-ecs.sh
          - ./scripts/bitbucket/deploy-backend-ecs.sh
          - echo ">>> Running migrations and unified chat backfill"
          - apt-get update -qq && apt-get install -y -qq curl
          - chmod +x ./scripts/bitbucket/run-migrations.sh
          - ./scripts/bitbucket/run-migrations.sh

    - step: &deploy-backend-prod
        name: Deploy Backend to Prod
        oidc: true
        deployment: production
        trigger: manual
        services:
          - docker
        script:
          - *setup-oidc
          - chmod +x ./scripts/bitbucket/deploy-backend-ecs.sh
          - ./scripts/bitbucket/deploy-backend-ecs.sh

    - step: &dr-failover-dev
        name: DR Full Failover (Dev) — restore + deploy + report
        oidc: true
        deployment: dev
        max-time: 60
        script:
          - *setup-oidc
          - apt-get update -qq && apt-get install -y -qq curl jq
          - export AWS_REGION="${DR_AWS_REGION:-us-east-1}"
          - export AWS_DEFAULT_REGION="${DR_AWS_REGION:-us-east-1}"
          - chmod +x ./scripts/dr/dr-failover.sh
          - ./scripts/dr/dr-failover.sh --environment dev --skip-cognito

    - step: &dr-failover-prod
        name: DR Full Failover (Prod) — restore + deploy + report
        oidc: true
        deployment: production
        max-time: 60
        script:
          - *setup-oidc
          - apt-get update -qq && apt-get install -y -qq curl jq
          - export AWS_REGION="${DR_AWS_REGION:-us-east-1}"
          - export AWS_DEFAULT_REGION="${DR_AWS_REGION:-us-east-1}"
          - chmod +x ./scripts/dr/dr-failover.sh
          - ./scripts/dr/dr-failover.sh --environment prod

    - step: &dr-deploy-backend-dev
        name: DR Deploy Backend Only (Dev, us-east-1)
        oidc: true
        deployment: dev
        script:
          - *setup-oidc
          - export AWS_REGION="${DR_AWS_REGION:-us-east-1}"
          - export AWS_DEFAULT_REGION="${DR_AWS_REGION:-us-east-1}"
          - chmod +x ./scripts/dr/deploy-dr-backend.sh
          - ./scripts/dr/deploy-dr-backend.sh

    - step: &dr-deploy-backend-prod
        name: DR Deploy Backend Only (Prod, us-east-1)
        oidc: true
        deployment: production
        script:
          - *setup-oidc
          - export AWS_REGION="${DR_AWS_REGION:-us-east-1}"
          - export AWS_DEFAULT_REGION="${DR_AWS_REGION:-us-east-1}"
          - chmod +x ./scripts/dr/deploy-dr-backend.sh
          - ./scripts/dr/deploy-dr-backend.sh

    - step: &dr-deploy-frontend-dev
        name: DR Deploy Frontend (Dev, us-east-1)
        oidc: true
        deployment: dev
        caches:
          - npm
        script:
          - *setup-oidc
          - export AWS_DEFAULT_REGION="${DR_AWS_REGION:-us-east-1}"
          - chmod +x ./scripts/dr/deploy-dr-frontend.sh
          - ./scripts/dr/deploy-dr-frontend.sh

    - step: &dr-deploy-frontend-prod
        name: DR Deploy Frontend (Prod, us-east-1)
        oidc: true
        deployment: production
        caches:
          - npm
        script:
          - *setup-oidc
          - export AWS_DEFAULT_REGION="${DR_AWS_REGION:-us-east-1}"
          - chmod +x ./scripts/dr/deploy-dr-frontend.sh
          - ./scripts/dr/deploy-dr-frontend.sh

    - step: &dr-run-migrations-dev
        name: DR Run Migrations (Dev, us-east-1)
        oidc: true
        deployment: dev
        script:
          - *setup-oidc
          - export AWS_REGION="${DR_AWS_REGION:-us-east-1}"
          - export AWS_DEFAULT_REGION="${DR_AWS_REGION:-us-east-1}"
          - export ECS_CLUSTER="${DR_ECS_CLUSTER:?Set DR_ECS_CLUSTER}"
          - export ECS_SERVICE="${DR_ECS_SERVICE:?Set DR_ECS_SERVICE}"
          - apt-get update && apt-get install -y curl
          - chmod +x ./scripts/bitbucket/run-migrations.sh
          - ./scripts/bitbucket/run-migrations.sh

    - step: &dr-teardown-compute-dev
        name: DR Teardown Compute (Dev)
        oidc: true
        deployment: dev
        script:
          - *setup-oidc
          - export AWS_REGION="${DR_AWS_REGION:-us-east-1}"
          - export AWS_DEFAULT_REGION="${DR_AWS_REGION:-us-east-1}"
          - chmod +x ./scripts/dr/teardown-dr-compute.sh
          - ./scripts/dr/teardown-dr-compute.sh

    - step: &deploy-infra-dev
        name: Deploy Infrastructure to Dev
        oidc: true
        deployment: dev
        script:
          - *setup-oidc
          - chmod +x ./scripts/bitbucket/deploy-infrastructure.sh
          - ./scripts/bitbucket/deploy-infrastructure.sh

    - step: &deploy-infra-prod
        name: Deploy Infrastructure to Prod
        oidc: true
        deployment: production
        trigger: manual
        script:
          - *setup-oidc
          - chmod +x ./scripts/bitbucket/deploy-infrastructure.sh
          - ./scripts/bitbucket/deploy-infrastructure.sh

    - step: &test-e2e-all-dev
        name: Test E2E All (Chromium)
        image: *playwright_docker_image
        caches:
          - npm
        script:
          - npm ci
          - *e2e-env-preflight
          - npm run test:e2e:all
        artifacts:
          - playwright-report/**
          - test-results/**

    - step: &run-ai-qa-dev
        name: QA Pipeline (Hybrid, Dev)
        oidc: true
        deployment: dev
        image: *playwright_docker_image
        caches:
          - npm
          - server-npm
        script:
          - *setup-oidc
          - npm ci
          - cd server && npm ci && cd ..
          - *e2e-env-preflight
          # QA runner discovers Jira targets from commit messages and tagged tests. It also fetches
          # QA runner secrets + artifact bucket from the backend CloudFormation stack.
          # Override QA_COMMIT_RANGE if you want a narrower/wider issue scan.
          - export QA_SUITE="${QA_SUITE:-critical}"
          - export QA_ENABLE_AC_VALIDATOR="${QA_ENABLE_AC_VALIDATOR:-false}"
          - export QA_AC_DRY_RUN="${QA_AC_DRY_RUN:-false}"
          # Infrastructure/meta tickets whose acceptance criteria describe
          # architecture (not user-visible behavior) should be opted out so
          # the agent does not waste a plan-generation call trying to parse
          # them. COHI-106 is the AI control plane itself.
          - export QA_AC_SKIP_ISSUES="${QA_AC_SKIP_ISSUES:-COHI-106,COHI-14,COHI-13}"
          # Forward the AC validator per-issue/per-run caps if the Run
          # pipeline dialog set them. When empty, acValidator.ts / planValidator.ts
          # fall back to their own defaults (25/10/25). Only re-export when
          # the dialog value is non-empty so we don't clobber any
          # deployment-level defaults with an empty string.
          - '[ -n "${QA_AC_MAX_STEPS_PER_ISSUE:-}" ] && export QA_AC_MAX_STEPS_PER_ISSUE || true'
          - '[ -n "${QA_AC_MAX_WRITES_PER_ISSUE:-}" ] && export QA_AC_MAX_WRITES_PER_ISSUE || true'
          - '[ -n "${QA_AC_MAX_WRITES_PER_RUN:-}" ] && export QA_AC_MAX_WRITES_PER_RUN || true'
          - chmod +x ./scripts/bitbucket/run-ai-qa.sh
          - ./scripts/bitbucket/run-ai-qa.sh
        artifacts:
          - playwright-report/**
          - test-results/**

    - step: &deploy-all-dev-force
        name: Force Deploy All to Dev
        oidc: true
        deployment: dev
        services:
          - docker
        script:
          - *setup-oidc
          - echo ">>> Force deploying infrastructure"
          - chmod +x ./scripts/bitbucket/deploy-infrastructure.sh
          - ./scripts/bitbucket/deploy-infrastructure.sh
          - echo ">>> Force deploying frontend"
          - chmod +x ./scripts/bitbucket/deploy-frontend.sh
          - ./scripts/bitbucket/deploy-frontend.sh
          - echo ">>> Force deploying backend"
          - chmod +x ./scripts/bitbucket/deploy-backend-ecs.sh
          - ./scripts/bitbucket/deploy-backend-ecs.sh
          - echo ">>> Running migrations"
          - apt-get update && apt-get install -y curl
          - chmod +x ./scripts/bitbucket/run-migrations.sh
          - ./scripts/bitbucket/run-migrations.sh

    - step: &deploy-all-prod-force
        name: Force Deploy All to Prod
        oidc: true
        deployment: production
        services:
          - docker
        script:
          - *setup-oidc
          - echo ">>> Force deploying infrastructure"
          - chmod +x ./scripts/bitbucket/deploy-infrastructure.sh
          - ./scripts/bitbucket/deploy-infrastructure.sh
          - echo ">>> Force deploying frontend"
          - chmod +x ./scripts/bitbucket/deploy-frontend.sh
          - ./scripts/bitbucket/deploy-frontend.sh
          - echo ">>> Force deploying backend"
          - chmod +x ./scripts/bitbucket/deploy-backend-ecs.sh
          - ./scripts/bitbucket/deploy-backend-ecs.sh
          - echo ">>> Running migrations"
          - apt-get update && apt-get install -y curl
          - chmod +x ./scripts/bitbucket/run-migrations.sh
          - ./scripts/bitbucket/run-migrations.sh

pipelines:
  # Branch-based deployments
  #
  # E2E policy:
  # - dev: run authenticated @critical E2E after deploy
  # - main (production): do not run authenticated post-deploy E2E in branch pipeline
  # - production smoke: run manually via custom pipeline `e2e-prod-smoke`
  branches:
    dev:
      - parallel:
          - step: *build-frontend
          - step: *build-backend
      - parallel:
          - step: *lint-test-tags
          - step: *test-frontend
          - step: *test-backend
          - step: *test-backend-integration
      - step: *deploy-dev
      - step: *test-e2e-critical

    main:
      - parallel:
          - step: *build-frontend
          - step: *build-backend
      - parallel:
          - step: *lint-test-tags
          - step: *test-frontend
          - step: *test-backend
          - step: *test-backend-integration
      - step: *deploy-prod

  # Pull request validation (only for PRs targeting dev or main)
  pull-requests:
    dev:
      - parallel:
          - step: *build-frontend
          - step: *build-backend
      - parallel:
          - step: *lint-test-tags
          - step: *test-frontend
          - step: *test-backend
          - step: *test-backend-integration
      - step: *test-e2e-smoke
    main:
      - parallel:
          - step: *build-frontend
          - step: *build-backend
      - parallel:
          - step: *lint-test-tags
          - step: *test-frontend
          - step: *test-backend
          - step: *test-backend-integration
      - step: *test-e2e-smoke

  # Custom pipelines for individual deployments
  custom:
    # Frontend only
    frontend-dev:
      - step: *build-frontend
      - step: *deploy-frontend-dev

    frontend-prod:
      - step: *build-frontend
      - step: *deploy-frontend-prod

    # Backend only
    backend-dev:
      - step: *build-backend
      - step: *deploy-backend-dev

    backend-prod:
      - step: *build-backend
      - step: *deploy-backend-prod

    # Infrastructure only (CloudFormation updates)
    infrastructure-dev:
      - step: *deploy-infra-dev

    infrastructure-prod:
      - step: *deploy-infra-prod

    # DR stacks — Aurora cluster + AWS Backup + optional DR landing (manual trigger only)
    # These are NOT part of the regular dev/prod branch pipeline.
    # Run after the normal infra deploy when DR template changes are merged.
    dr-stacks-dev:
      - variables:
          - name: SKIP_AURORA
            default: "false"
            allowed-values:
              - "false"
              - "true"
          - name: SKIP_BACKUP
            default: "false"
            allowed-values:
              - "false"
              - "true"
          - name: DEPLOY_DR_LANDING
            default: "false"
            allowed-values:
              - "false"
              - "true"
      - step:
          name: Deploy DR Stacks to Dev
          oidc: true
          deployment: dev
          script:
            - *setup-oidc
            - chmod +x ./scripts/bitbucket/deploy-dr-stacks.sh
            - ./scripts/bitbucket/deploy-dr-stacks.sh

    dr-stacks-prod:
      - variables:
          - name: SKIP_AURORA
            default: "false"
            allowed-values:
              - "false"
              - "true"
          - name: SKIP_BACKUP
            default: "false"
            allowed-values:
              - "false"
              - "true"
          - name: DEPLOY_DR_LANDING
            default: "false"
            allowed-values:
              - "false"
              - "true"
      - step:
          name: Deploy DR Stacks to Prod
          oidc: true
          deployment: production
          trigger: manual
          script:
            - *setup-oidc
            - chmod +x ./scripts/bitbucket/deploy-dr-stacks.sh
            - ./scripts/bitbucket/deploy-dr-stacks.sh

    dr-failover-dev:
      - step: *dr-failover-dev

    dr-failover-prod:
      - step: *dr-failover-prod

    dr-deploy-backend-dev:
      - step: *dr-deploy-backend-dev

    dr-deploy-backend-prod:
      - step: *dr-deploy-backend-prod

    dr-deploy-frontend-dev:
      - step: *dr-deploy-frontend-dev

    dr-deploy-frontend-prod:
      - step: *dr-deploy-frontend-prod

    dr-run-migrations-dev:
      - step: *dr-run-migrations-dev

    dr-teardown-compute-dev:
      - step: *dr-teardown-compute-dev

    # Full deploy with test gates
    deploy-all-dev:
      - parallel:
          - step: *build-frontend
          - step: *build-backend
      - parallel:
          - step: *test-frontend
          - step: *test-backend
          - step: *test-backend-integration
      - step: *deploy-all-dev-force
      - step: *test-e2e-all-dev

    deploy-all-prod:
      - parallel:
          - step: *build-frontend
          - step: *build-backend
      - parallel:
          - step: *test-frontend
          - step: *test-backend
          - step: *test-backend-integration
      - step: *deploy-all-prod-force

    e2e-dev:
      - step: *test-e2e-all-dev

    e2e-regression:
      - step: *test-e2e-regression

    e2e-prod-smoke:
      - step: *test-e2e-prod-smoke

    # Hybrid QA pipeline — regression reporting always runs, AC validation is
    # gated behind QA_ENABLE_AC_VALIDATOR=true.
    # The `variables:` block below surfaces input fields in the Bitbucket
    # "Run pipeline" dialog so you can flip the AC validator on for a single
    # run without editing YAML or adding deployment-level variables.
    ai-qa-dev:
      - variables:
          - name: QA_SUITE
            default: "critical"
            allowed-values:
              - "smoke"
              - "critical"
              - "regression"
              - "all"
          - name: QA_ENABLE_AC_VALIDATOR
            default: "false"
            allowed-values:
              - "false"
              - "true"
          - name: QA_AC_DRY_RUN
            default: "false"
            allowed-values:
              - "false"
              - "true"
          - name: QA_AC_ALLOW_BROAD_SCOPE_TOKEN
            default: ""
          - name: QA_AC_SKIP_ISSUES
            default: "COHI-106,COHI-14,COHI-13"
          - name: QA_COMMIT_RANGE
            default: ""
          - name: QA_COMMIT_LOOKBACK
            default: ""
          # Upper bound on steps the AI plan generator is allowed to emit per
          # Jira issue. Defaults to 25 in planValidator.ts. Large ACs (20+
          # numbered items) can legitimately blow past 25; bump this for the
          # run without editing code.
          - name: QA_AC_MAX_STEPS_PER_ISSUE
            default: ""
          # Upper bound on self-scoped write actions (clicks, fills, drags,
          # POSTs) the AC plan executor is allowed to perform per Jira issue.
          # Default 10 in acValidator.ts. Interaction-heavy UI stories with
          # many buttons/drags can legitimately exceed 10.
          - name: QA_AC_MAX_WRITES_PER_ISSUE
            default: ""
          # Aggregate write-action cap across every issue validated in the
          # same pipeline run. Default 25 in acValidator.ts. Raise when
          # running several interaction-heavy issues in one pipeline.
          - name: QA_AC_MAX_WRITES_PER_RUN
            default: ""
      - step: *run-ai-qa-dev

    poll-jira-approvals:
      - step:
          name: Poll Jira Evidence Approvals
          oidc: true
          deployment: dev
          image: node:20
          caches:
            - server-npm
          script:
            - *setup-oidc
            - cd server && npm ci
            - npx tsx scripts/qa/poll-jira-approvals.ts

    # Database migrations
    run-migrations-dev:
      - step:
          name: Run Migrations (Dev)
          oidc: true
          deployment: dev
          script:
            - *setup-oidc
            - apt-get update && apt-get install -y curl
            - chmod +x ./scripts/bitbucket/run-migrations.sh
            - ./scripts/bitbucket/run-migrations.sh

    run-unified-chat-backfill-dev:
      - step:
          name: Run Unified Chat Backfill (Dev)
          oidc: true
          deployment: dev
          script:
            - *setup-oidc
            - apt-get update && apt-get install -y curl
            - chmod +x ./scripts/bitbucket/run-unified-chat-backfill.sh
            - ./scripts/bitbucket/run-unified-chat-backfill.sh

    run-migrations-prod:
      - step:
          name: Run Migrations (Prod)
          oidc: true
          deployment: production
          trigger: manual
          script:
            - *setup-oidc
            - apt-get update && apt-get install -y curl
            - chmod +x ./scripts/bitbucket/run-migrations.sh
            - ./scripts/bitbucket/run-migrations.sh
